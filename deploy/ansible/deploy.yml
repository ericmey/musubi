---
- name: Deploy Musubi container stack
  hosts: musubi
  become: true
  pre_tasks:
    - name: Inspect 1Password Connect environment file
      ansible.builtin.stat:
        path: /etc/musubi/connect.env
      register: musubi_connect_env
      changed_when: false
      no_log: true

    - name: Require root-only 1Password Connect environment file
      ansible.builtin.assert:
        that:
          - musubi_connect_env.stat.exists
          - (musubi_connect_env.stat.pw_name | default("")) == "root"
          - (musubi_connect_env.stat.mode | default("")) == "0600"
        fail_msg: "1Password Connect preflight failed"
      no_log: true

    - name: Require the 1Password CLI runtime
      ansible.builtin.command: /usr/bin/op --version
      changed_when: false
      check_mode: false
      no_log: true

  tasks:
    - name: Render non-secret production environment
      ansible.builtin.template:
        src: templates/env.production.j2
        dest: "{{ musubi_config_dir }}/.env.production"
        owner: root
        group: "{{ musubi_service_group }}"
        mode: "0640"
      no_log: true

    - name: Render docker-compose anchor
      ansible.builtin.template:
        src: templates/docker-compose.yml.j2
        dest: "{{ musubi_config_dir }}/docker-compose.yml"
        owner: root
        group: "{{ musubi_service_group }}"
        mode: "0640"

    - name: Render Prometheus scrape config
      # Prometheus mounts this file read-only at
      # /etc/prometheus/prometheus.yml. The reload-prometheus handler
      # below sends SIGHUP to the running container on change so the
      # new config is picked up without recreating it.
      ansible.builtin.template:
        src: templates/prometheus.yml.j2
        dest: "{{ musubi_config_dir }}/prometheus.yml"
        owner: root
        group: "{{ musubi_service_group }}"
        mode: "0644"

    - name: Render op-run reference template
      ansible.builtin.template:
        src: templates/secrets.tpl.j2
        dest: "{{ musubi_config_dir }}/secrets.tpl"
        owner: root
        group: "{{ musubi_service_group }}"
        mode: "0640"

    - name: Render Qdrant op-inject reference template
      ansible.builtin.template:
        src: templates/qdrant.token.tpl.j2
        dest: "{{ musubi_config_dir }}/qdrant.token.tpl"
        owner: root
        group: "{{ musubi_service_group }}"
        mode: "0640"

    - name: Install 1Password-backed Musubi systemd unit
      ansible.builtin.template:
        src: templates/musubi.service.j2
        dest: /etc/systemd/system/musubi.service
        owner: root
        group: root
        mode: "0644"

    - name: Remove legacy persistent Qdrant scrape token
      ansible.builtin.file:
        path: "{{ musubi_config_dir }}/qdrant.token"
        state: absent

    - name: Pull missing pinned images
      ansible.builtin.shell:
        cmd: >-
          set -a && . /etc/musubi/connect.env && set +a &&
          exec /usr/bin/op run --env-file={{ musubi_config_dir }}/secrets.tpl --
          /usr/bin/docker compose -f {{ musubi_config_dir }}/docker-compose.yml
          pull --policy missing
        executable: /bin/bash
      changed_when: true
      no_log: true

    - name: Start inference and storage services and wait for healthy
      ansible.builtin.shell:
        cmd: >-
          set -a && . /etc/musubi/connect.env && set +a &&
          exec /usr/bin/op run --env-file={{ musubi_config_dir }}/secrets.tpl --
          /usr/bin/docker compose -f {{ musubi_config_dir }}/docker-compose.yml
          up -d --pull missing --remove-orphans --wait --wait-timeout 300
          qdrant tei-dense tei-sparse tei-reranker ollama
        executable: /bin/bash
      changed_when: true
      no_log: true

    - name: Ensure the LLM model is pulled into Ollama
      # Idempotent: `ollama pull` no-ops if the model is already present.
      # Runs after inference services are up (compose healthchecks guarantee
      # ollama HTTP is responsive) but before Core starts.
      ansible.builtin.command:
        cmd: docker compose -f {{ musubi_config_dir }}/docker-compose.yml exec -T ollama ollama pull {{ musubi_ollama_model }}
      register: ollama_pull
      changed_when: "'pulling' in (ollama_pull.stdout | default(''))"

    - name: Reload systemd and start the 1Password-backed stack
      ansible.builtin.systemd_service:
        name: musubi
        daemon_reload: true
        enabled: true
        state: restarted

    - name: Check Core health
      ansible.builtin.uri:
        url: "{{ musubi_health_urls.core }}"
        status_code: 200
      retries: 12
      delay: 5
      register: core_health
      until: core_health.status == 200
      changed_when: false
