---
# operator_ssh_user: ssh user used to reach the Musubi workload host.
# Override via -e @~/.musubi-secrets/inventory-vars.yml if it differs from the
# default here. Required at runtime; must resolve to a non-placeholder string.
operator_ssh_user: "ericmey"

musubi_service_user: musubi
musubi_service_group: musubi

musubi_root: /var/lib/musubi
musubi_config_dir: /etc/musubi
musubi_log_dir: /var/log/musubi
musubi_data_dirs:
  - /var/lib/musubi/vault
  - /var/lib/musubi/artifact-blobs
  - /var/lib/musubi/qdrant-storage
  - /var/lib/musubi/qdrant-snapshots
  - /var/lib/musubi/tei-models
  - /var/lib/musubi/ollama-models
  - /var/lib/musubi/lifecycle
  - /var/lib/musubi/prometheus-data
  - /var/lib/musubi/backups

musubi_core_port: 8100
# Musubi Core image — pinned by immutable digest.
#
# Every release has a cosign-signed + SBOM-attested + Trivy-scanned
# image on GHCR, produced by `.github/workflows/publish-core-image.yml`.
# The workflow run summary is the always-available source for the
# digest pin block. The matching GitHub release body also carries it
# when the tag-triggered publish run executes.
#
# Bumped automatically by `.github/workflows/auto-digest-bump.yml` on
# every successful publish — a pin PR opens, CI runs, auto-merge
# lands it. Deploy with `ansible-playbook deploy/ansible/update.yml`
# from the control host (see `deploy/runbooks/upgrade-image.md`).
#
# For what's in a given version, see CHANGELOG.md (authoritative)
# rather than a comment here — version-specific notes rot; the
# changelog is the source of truth.
musubi_core_image: "ghcr.io/ericmey/musubi-core@sha256:a1899c04c07177f024959fbb924d089d67e970b115b3dd07412152a943acddb7"
musubi_qdrant_image: "qdrant/qdrant:v1.17.1"
# TEI image tag = <compute-capability>-<version>. RTX 3080 is Ampere,
# compute 8.6 → `86-*`. Other GPUs: `turing-*` (RTX 20xx), `89-*` (RTX 40xx),
# `hopper-*` (H100/H200), `cpu-*` (no GPU). See
# https://github.com/huggingface/text-embeddings-inference for the full list.
musubi_tei_image: "ghcr.io/huggingface/text-embeddings-inference:86-1.2.0"
musubi_ollama_image: "ollama/ollama:latest"
musubi_ollama_model: "qwen3:4b"
# Prometheus: pinned to an LTS-ish minor so the scrape-config syntax
# (see deploy/prometheus/prometheus.yml) doesn't drift under us.
musubi_prometheus_image: "prom/prometheus:v2.54.1"

musubi_required_packages:
  - ca-certificates
  - chrony
  - curl
  - docker-ce
  - docker-ce-cli
  - docker-compose-plugin
  - gnupg
  - logrotate
  - nvidia-container-toolkit
  - unattended-upgrades
# NVIDIA GPU driver is NOT pinned here — a specific `nvidia-driver-NNN-server`
# package name rots quickly (and will downgrade a pre-staged newer driver).
# bootstrap.yml instead probes for an existing driver via `nvidia-smi`, and
# runs `ubuntu-drivers autoinstall` only on hosts that don't have one yet.

musubi_health_urls:
  core: "http://127.0.0.1:8100/v1/ops/health"
  qdrant: "http://127.0.0.1:6333/health"
  ollama: "http://127.0.0.1:11434/api/tags"
