---
# In-place upgrade for a running Musubi stack.
#
# Companion to `deploy.yml` (first-deploy / full bring-up) and
# `bootstrap.yml` (host-level package install). `update.yml` assumes
# both have already run; it force-pulls whichever container images
# are referenced in the rendered compose, recreates only the services
# the operator names, runs a post-apply health probe, and appends an
# upgrade-history entry.
#
# Why `policy: always` and not `missing` (deploy.yml's default):
# `missing` is "fetch only if the image isn't already on the host".
# That's right for first-deploy but wrong for upgrade — after a
# `musubi_core_image` bump, the old image IS on the host, and
# `missing` would no-op, leaving the running container on the
# previous digest forever. `always` forces Docker to re-check the
# registry; unchanged digests remain no-ops.
#
# Per-service recreate (`changed_services`) defaults to `[core]` — it
# is by far the most frequently-updated service. Override when an
# image bump touches another service:
#
#     ansible-playbook update.yml \
#         -e changed_services='["core","tei-dense"]'

- name: Update a running Musubi stack
  hosts: musubi
  become: true
  vars:
    changed_services: ["core"]
  pre_tasks:
    - name: Inspect 1Password Connect environment file
      ansible.builtin.stat:
        path: /etc/musubi/connect.env
      register: musubi_connect_env
      changed_when: false
      no_log: true

    - name: Require root-only 1Password Connect environment file
      ansible.builtin.assert:
        that:
          - musubi_connect_env.stat.exists
          - (musubi_connect_env.stat.pw_name | default("")) == "root"
          - (musubi_connect_env.stat.mode | default("")) == "0600"
        fail_msg: "1Password Connect preflight failed"
      no_log: true

    - name: Require the 1Password CLI runtime
      ansible.builtin.command: /usr/bin/op --version
      changed_when: false
      check_mode: false
      no_log: true

  tasks:
    - name: Re-render docker-compose anchor (may have new services / mounts / env refs)
      ansible.builtin.template:
        src: templates/docker-compose.yml.j2
        dest: "{{ musubi_config_dir }}/docker-compose.yml"
        owner: root
        group: "{{ musubi_service_group }}"
        mode: "0640"

    - name: Refresh production environment (version / config vars)
      ansible.builtin.template:
        src: templates/env.production.j2
        dest: "{{ musubi_config_dir }}/.env.production"
        owner: root
        group: "{{ musubi_service_group }}"
        mode: "0640"
      no_log: true

    - name: Refresh Prometheus scrape config (may have new targets)
      ansible.builtin.template:
        src: templates/prometheus.yml.j2
        dest: "{{ musubi_config_dir }}/prometheus.yml"
        owner: root
        group: "{{ musubi_service_group }}"
        mode: "0644"
        # Prometheus bind-mounts this file. Atomic replacement leaves the
        # running container attached to the old inode, so SIGHUP would reload
        # stale configuration.
        unsafe_writes: true
      notify: reload prometheus

    - name: Refresh op-run reference template
      ansible.builtin.template:
        src: templates/secrets.tpl.j2
        dest: "{{ musubi_config_dir }}/secrets.tpl"
        owner: root
        group: "{{ musubi_service_group }}"
        mode: "0640"
      notify: Restart Musubi stack

    - name: Refresh Qdrant op-inject reference template
      ansible.builtin.template:
        src: templates/qdrant.token.tpl.j2
        dest: "{{ musubi_config_dir }}/qdrant.token.tpl"
        owner: root
        group: "{{ musubi_service_group }}"
        mode: "0640"
      notify: Restart Musubi stack

    - name: Refresh 1Password-backed Musubi systemd unit
      ansible.builtin.template:
        src: templates/musubi.service.j2
        dest: /etc/systemd/system/musubi.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart Musubi stack

    - name: Remove legacy persistent Qdrant scrape token
      ansible.builtin.file:
        path: "{{ musubi_config_dir }}/qdrant.token"
        state: absent
      notify: Restart Musubi stack

    - name: Force-pull any image references (policy=always)
      # Distinct from deploy.yml, which uses policy=missing. Without
      # `always` a `musubi_core_image` bump of the floating `:v2` tag
      # would no-op because the old digest-backed image is already
      # present locally.
      ansible.builtin.command:
        cmd: >-
          /usr/bin/op run --env-file={{ musubi_config_dir }}/secrets.tpl --
          /usr/bin/docker compose -f {{ musubi_config_dir }}/docker-compose.yml pull
          --policy always
          {{ changed_services | join(' ') }}
      changed_when: true
      no_log: true

    - name: Recreate only the services the operator named
      ansible.builtin.command:
        cmd: >-
          /usr/bin/op run --env-file={{ musubi_config_dir }}/secrets.tpl --
          /usr/bin/docker compose -f {{ musubi_config_dir }}/docker-compose.yml
          up -d --pull never --no-deps --force-recreate --wait --wait-timeout 300
          {{ changed_services | join(' ') }}
      changed_when: true
      no_log: true
      notify:
        - Ensure upgrade-history log directory exists
        - Append an upgrade-history entry

    - name: Probe Core health post-update
      ansible.builtin.uri:
        url: "{{ musubi_health_urls.core }}"
        status_code: 200
      retries: 12
      delay: 5
      register: core_health
      until: core_health.status == 200
      changed_when: false

    # A pin change is not proof that the recreated container converged. Read
    # the actual image after the targeted update and fail closed on a stale or
    # downgraded Core/lifecycle worker.
    - name: Inspect recreated containers
      community.docker.docker_container_info:
        name: "musubi-{{ item }}-1"
      loop: "{{ changed_services }}"
      register: recreated_container_info
      when: not ansible_check_mode

    - name: Assert core-image services match pinned digest
      ansible.builtin.assert:
        that:
          - item.container.Config.Image == musubi_core_image
        fail_msg: >-
          Service {{ item.item }} is not running the pinned image.
          Recreate did not converge.
        success_msg: "Service {{ item.item }} is running the pinned image."
      loop: "{{ recreated_container_info.results }}"
      when:
        - not ansible_check_mode
        - item.item in ['core', 'lifecycle-worker']
      loop_control:
        label: "{{ item.item }}"
      # docker_container_info contains the full environment, including
      # secret-valued variables. Never echo the loop item into operator logs.
      no_log: true

  handlers:
    - name: reload prometheus
      ansible.builtin.command:
        cmd: docker compose -f {{ musubi_config_dir }}/docker-compose.yml kill -s HUP prometheus
      register: prometheus_reload
      failed_when:
        - prometheus_reload.rc != 0
        - "'no such service' not in (prometheus_reload.stderr | default(''))"
        - "'not running' not in (prometheus_reload.stderr | default(''))"
      changed_when: prometheus_reload.rc == 0

    - name: Verify lifecycle-worker is scraped after reload
      listen: reload prometheus
      ansible.builtin.uri:
        url: >-
          http://127.0.0.1:9090/api/v1/query?query=up%7Bjob%3D%22lifecycle-worker%22%7D
        status_code: 200
        return_content: true
      register: prometheus_lifecycle_query
      retries: 15
      delay: 2
      until:
        - prometheus_lifecycle_query.json.status == 'success'
        - prometheus_lifecycle_query.json.data.result | length == 1
        - prometheus_lifecycle_query.json.data.result[0].value[1] == '1'
      changed_when: false

    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Restart Musubi stack
      ansible.builtin.systemd_service:
        name: musubi
        state: restarted

    - name: Ensure upgrade-history log directory exists
      ansible.builtin.file:
        path: /var/log/musubi
        state: directory
        owner: "{{ musubi_service_user }}"
        group: "{{ musubi_service_group }}"
        mode: "0750"

    - name: Append an upgrade-history entry
      # JSON-Lines so `jq` works without a wrapper array. Operators tail
      # this during drift investigations.
      ansible.builtin.lineinfile:
        path: /var/log/musubi/upgrade-history.jsonl
        create: true
        owner: "{{ musubi_service_user }}"
        group: "{{ musubi_service_group }}"
        mode: "0640"
        line: >-
          {"ts":"{{ lookup('pipe', 'date -Iseconds') }}",
          "services":{{ changed_services | to_json }},
          "core_image":"{{ musubi_core_image }}",
          "triggered_by":"{{ lookup('env', 'USER') | default('ansible', true) }}"}
