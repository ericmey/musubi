# Alertmanager routing for Musubi alerts.
# Per docs/Musubi/09-operations/alerts.md.

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    - matchers:
        - 'severity="push"'
      receiver: ntfy
      repeat_interval: 30m
    - matchers:
        - 'severity="email"'
      receiver: email
      repeat_interval: 24h

receivers:
  - name: default
    webhook_configs:
      - url: "http://musubi-core:8100/v1/ops/alert-sink"
  - name: ntfy
    webhook_configs:
      - url: "https://ntfy.sh/musubi-alerts"
  - name: email
    email_configs:
      - to: eric@example.com
        from: alertmanager@musubi.internal
        smarthost: smtp.example.com:587
        require_tls: true
