# RET-004 canonical scheduled-gate graded corpus (checksum-pinned in manifest.json).
#
# Hardened per Yua's ruling (2026-07-15): >=8 graded queries covering fast, deep, provisional
# immediate recall, procedural recall, semantic paraphrase, rare lexical lookup, and
# correction/negation. Each query has one relevance-3 target, a relevance-1 related item where apt,
# and unlabeled hard distractors seeded alongside. >=half the queries are NOT near-verbatim
# restatements of their target: for those, a distractor ECHOES the query's surface tokens while
# meaning something wrong/stale/negated, and the target answers SEMANTICALLY with different words —
# so a naive exact-token ranker ranks the wrong doc first (the corpus-discrimination contract asserts
# a naive baseline fails). Episodic-only. Real quality numbers come from the scheduled x86 TEI run;
# thresholds are frozen and never tuned to content.

documents:
  # 1. livekit restart — EASY / near-verbatim (a naive ranker should get this one)
  - {key: livekit-restart, plane: episodic, state: matured, content: "To restart the livekit voice agent after a deploy: stop the systemd unit, clear the session cache, then start the unit and confirm it re-registers with the room server."}
  - {key: livekit-arch, plane: episodic, state: matured, content: "Background on the livekit voice agent architecture: how rooms are allocated across regions and how the agent connects."}

  # 2. bring the bot online (paraphrase of restart) — TRAP echoes "bring voice bot online"
  - {key: agent-recover, plane: episodic, state: matured, content: "Recovering a downed agent: stop the failed process, clear its cache, and start a fresh one so it re-registers."}
  - {key: livekit-scale-trap, plane: episodic, state: matured, content: "To bring more voice bots online, bring up additional voice bot replicas online and raise the replica count — this brings voice bots online by scaling out, it does not recover a downed one."}

  # 3. presence token current this session (provisional immediate recall) — TRAP echoes "presence token rotation session"
  - {key: token-current, plane: episodic, state: provisional, content: "Yes — the credential just changed and is live now; the new value took effect a moment ago in this working context."}
  - {key: token-rotation-history-trap, plane: episodic, state: matured, content: "The presence token rotation history for this session review lists every presence token rotation; this session's presence token rotation audit is archived, not current."}

  # 4. trade latency for recall on long-tail (rare lexical: ef_search) — TRAP echoes "trade latency recall long-tail"
  - {key: ef-search, plane: episodic, state: matured, content: "Raising the HNSW ef_search parameter widens the search beam so more true neighbors are considered before ranking; set it higher per collection when answers are being missed."}
  - {key: prefetch-related, plane: episodic, state: matured, content: "The hybrid prefetch limit controls how many candidates each channel returns before fusion."}
  - {key: latency-recall-tradeoff-trap, plane: episodic, state: matured, content: "You cannot trade latency for recall on long-tail queries for free; trading latency for recall on long-tail search usually hurts both, so avoid trading latency for recall blindly."}

  # 5. sync the vault on every write (correction/negation) — TRAP echoes "sync vault every write"
  - {key: vault-close-sync, plane: episodic, state: matured, content: "The vault now flushes to the store only when a file is closed, to stop the embedder from thrashing on partial edits. That is the current behaviour."}
  - {key: vault-write-sync-trap, plane: episodic, state: matured, content: "Sync the vault on every write event: sync vault on every write, syncing the vault on every write event writes on every write. This sync-on-every-write approach is the retired one."}

  # 6. eligible to enter curated knowledge (semantic paraphrase) — TRAP echoes "enter curated knowledge"
  - {key: promotion-rule, plane: episodic, state: matured, content: "A memory qualifies for the curated tier once it has matured, been corroborated across two or more sessions, and cleared synthesis review."}
  - {key: curated-removal-trap, plane: episodic, state: matured, content: "To make an item leave and enter out of curated knowledge, or to enter the archive from curated knowledge, mark the curated knowledge entry superseded — this removes curated knowledge, it does not qualify a memory for it."}

  # 7. revert a bad musubi-core deploy (procedural, non-verbatim) — TRAP echoes "bad musubi-core deploy"
  - {key: rollback-runbook, plane: episodic, state: matured, content: "Undoing a broken release: pin the previous signed digest, redeploy, verify /ops/status, and confirm the broken build is no longer serving."}
  - {key: deploy-general, plane: episodic, state: matured, content: "General notes on the musubi-core deploy pipeline and how signed digests are pinned."}
  - {key: deploy-forward-trap, plane: episodic, state: matured, content: "Shipping a new bad musubi-core deploy forward: to deploy musubi-core forward, bump the pin to a newer musubi-core deploy digest — this is a forward musubi-core deploy, not an undo."}

  # 8. model that makes sparse lexical embeddings — EASY-ish (target names it), one dense trap
  - {key: splade-sparse, plane: episodic, state: matured, content: "SPLADE-v3 produces the sparse lexical embeddings for retrieval, expanding each token into a weighted term vector for the sparse channel."}
  - {key: dense-model-trap, plane: episodic, state: matured, content: "The model that turns text into dense vectors is BGE-M3; it makes the dense semantic embeddings, a different channel than the sparse lexical one."}

queries:
  - id: q-livekit-restart
    text: "how do I restart the livekit voice agent after a deploy"
    mode: fast
    relevant:
      - {key: livekit-restart, relevance: 3}
      - {key: livekit-arch, relevance: 1}
  - id: q-bring-bot-online
    text: "how do I bring the voice bot back online"
    mode: fast
    relevant:
      - {key: agent-recover, relevance: 3}
  - id: q-token-current
    text: "is the presence token current after this session's rotation"
    mode: fast
    relevant:
      - {key: token-current, relevance: 3}
  - id: q-latency-recall
    text: "how do I trade query latency for better recall on long-tail searches"
    mode: deep
    relevant:
      - {key: ef-search, relevance: 3}
      - {key: prefetch-related, relevance: 1}
  - id: q-vault-write
    text: "should we sync the vault on every write event"
    mode: fast
    relevant:
      - {key: vault-close-sync, relevance: 3}
  - id: q-curated-enter
    text: "what makes a memory eligible to enter curated knowledge"
    mode: deep
    relevant:
      - {key: promotion-rule, relevance: 3}
  - id: q-revert-deploy
    text: "walk me through reverting a bad musubi-core deploy"
    mode: deep
    relevant:
      - {key: rollback-runbook, relevance: 3}
      - {key: deploy-general, relevance: 1}
  - id: q-sparse-model
    text: "which model produces the sparse lexical embeddings"
    mode: fast
    relevant:
      - {key: splade-sparse, relevance: 3}
