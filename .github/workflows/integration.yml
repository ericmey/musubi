# Integration suite — boots the test-env compose stack and runs the
# real-services smoke scenarios from tests/integration/test_smoke.py.
#
# Triggers:
#   - PR-trigger PATH FILTER: runs ONCE on PRs that touch the harness
#     itself (so this PR — and any followup that edits the harness —
#     verify before merge). Unrelated PRs don't pay the docker-in-docker
#     cost.
#   - SCHEDULE: nightly at 07:00 UTC, with a 3-run matrix so flakes
#     surface over time. The "no flakes on 3 consecutive runs" DoD
#     bullet is evidenced by the first ~week of nightly runs after
#     this lands.
#   - WORKFLOW_DISPATCH: operator can trigger on demand (e.g. before
#     accepting a follow-up PR that should have been path-filtered
#     but wasn't).
#
# Per slice-ops-integration-harness §Implementation notes.

name: Integration suite

on:
  pull_request:
    paths:
      - 'tests/integration/**'
      - 'deploy/test-env/**'
      - '.github/workflows/integration.yml'
      - 'Makefile'
      - 'pyproject.toml'
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  integration:
    name: Integration (run ${{ matrix.run }})
    # Skip integration on release-please PRs — they bump pyproject.toml
    # (so they match the `paths:` filter above) but the musubi-core image
    # for the new version doesn't exist until the release-please PR
    # MERGES and triggers `Publish Musubi Core image`. Booting the
    # test-env compose stack against an unpublished image always fails
    # with NETWORK_ERROR. Scheduled nightly runs, workflow_dispatch, and
    # real PRs touching `tests/integration/**` / `deploy/test-env/**` /
    # the integration workflow itself / `Makefile` still run.
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        # PR / dispatch: 1 run for fast feedback. Schedule: 3 parallel
        # runs for flake characterization (DoD evidence path).
        run: ${{ github.event_name == 'schedule' && fromJSON('[1, 2, 3]') || fromJSON('[1]') }}
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync --extra dev

      - name: Cache HuggingFace + Ollama models
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/huggingface
            ~/.ollama
          key: integration-models-v4
          restore-keys: integration-models-v4

      - name: Boot the test-env compose stack
        run: |
          docker compose -f deploy/test-env/docker-compose.test.yml \
            -p musubi-integration up -d --wait --wait-timeout 600
        timeout-minutes: 12

      - name: Pull the Ollama test model (one-shot side-car)
        run: |
          # ollama-pull lives behind the `pull` profile so the main
          # `--wait` boot doesn't trip on its clean exit. Run it now
          # synchronously; the test stack waits on it before any
          # concept-synthesis bullet executes.
          docker compose -f deploy/test-env/docker-compose.test.yml \
            -p musubi-integration --profile pull run --rm ollama-pull
        timeout-minutes: 5

      - name: Run integration suite
        env:
          MUSUBI_TEST_PROJECT: musubi-integration
          # musubi-core boots in-process via uvicorn here (see compose
          # header — core is NOT in the test-env stack). At boot it
          # loads the SPLADE-v3 tokenizer for the ChunkedEmbedder
          # (gotcha §9). If the HF cache miss-falls-through to a live
          # download, splade-v3's gated 401s without an auth token —
          # the same trap the production image's build-time `HF_TOKEN`
          # secret addresses for the baked-in cache. Wire the same
          # secret here so the integration suite has an alternative
          # to a warm `~/.cache/huggingface`.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -o pipefail
          uv run pytest tests/integration/ -m integration -ra --strict-markers --no-cov -v 2>&1 | tee integration.log
        timeout-minutes: 12

      - name: Show compose logs on failure
        if: failure()
        run: |
          docker compose -f deploy/test-env/docker-compose.test.yml \
            -p musubi-integration logs --no-color --tail 200 || true

      - name: Tear down
        if: always()
        run: |
          docker compose -f deploy/test-env/docker-compose.test.yml \
            -p musubi-integration down -v --remove-orphans || true

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-log-run-${{ matrix.run }}
          path: integration.log
          if-no-files-found: ignore
