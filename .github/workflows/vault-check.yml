name: Vault check

on:
  push:
    branches: [main, v2]
    paths:
      - "docs/architecture/**"
      - "docs/AGENT-PROCESS.md"
      - ".github/workflows/vault-check.yml"
  pull_request:
    branches: [main, v2]
    paths:
      - "docs/architecture/**"
      - "docs/AGENT-PROCESS.md"
      - ".github/workflows/vault-check.yml"

jobs:
  hygiene:
    name: Vault hygiene (frontmatter + slice DAG + spec Test Contracts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        # Required by both docs/architecture/_tools/check.py and the
        # wikilink advisory step below. Without this, the workflow used
        # to fail at `import yaml` before doing any useful work.
        run: pip install --no-cache-dir pyyaml

      - name: check.py all (authoritative gate)
        # Single source of truth — same script `make agent-check` runs
        # locally, so CI and agent-side checks stay aligned.
        run: python3 docs/architecture/_tools/check.py all

  wikilinks:
    name: Wikilink resolution (advisory)
    runs-on: ubuntu-latest
    # Advisory for now: the vault has ~60 known-broken wikilinks (templates,
    # stubs, legacy paths). Triage + promotion-to-blocking is tracked as a
    # follow-up coordination task. Fails OPEN so the run is green but still
    # surfaces the list in job output.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib, re, sys

          root = pathlib.Path("docs/architecture")
          md_stems = {p.relative_to(root).with_suffix("") for p in root.rglob("*.md")}
          pattern = re.compile(r"\[\[([^\]|#]+)")

          broken: list[tuple[pathlib.Path, str]] = []
          for md in root.rglob("*.md"):
              for m in pattern.finditer(md.read_text(errors="ignore")):
                  target = pathlib.PurePosixPath(m.group(1).strip())
                  if target in md_stems or target.with_suffix("") in md_stems:
                      continue
                  if str(target) in {"CLAUDE", "README"}:
                      continue
                  broken.append((md.relative_to(root), str(target)))

          if broken:
              print("BROKEN WIKILINKS (advisory — not PR-blocking yet):\n")
              for src, tgt in broken[:100]:
                  print(f"  {src}: [[{tgt}]]")
              print(f"\ntotal: {len(broken)}")
              # continue-on-error: true above means this still surfaces but doesn't block.
              sys.exit(1)
          print("No broken wikilinks.")
          PY
