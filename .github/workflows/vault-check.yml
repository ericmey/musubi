name: Vault check

on:
  push:
    branches: [main, v2]
    paths:
      - "docs/Musubi/**"
      - "docs/AGENT-PROCESS.md"
      - ".github/workflows/vault-check.yml"
  pull_request:
    branches: [main, v2]
    paths:
      - "docs/Musubi/**"
      - "docs/AGENT-PROCESS.md"
      - ".github/workflows/vault-check.yml"

jobs:
  hygiene:
    name: Vault hygiene (frontmatter + slice DAG + spec contracts + wikilinks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        # Required by docs/Musubi/_tools/check.py for frontmatter parsing.
        run: pip install --no-cache-dir pyyaml

      - name: check.py all (authoritative gate)
        # Single source of truth — same script `make agent-check` runs locally,
        # so CI and agent-side gates stay aligned. Covers:
        #   - frontmatter schema on every note
        #   - slice DAG (no cycles, owns_paths non-conflict, status valid)
        #   - spec Test Contract hygiene (presence, implements: field)
        #   - wikilink resolution (.md + .canvas + .base; skips code spans + _templates/)
        #   - vault ↔ GitHub Issue drift (Dual-update rule, via GH_TOKEN below).
        env:
          # gh is pre-installed on ubuntu-latest; surface the Actions token as
          # GH_TOKEN so check.py's `_fetch_slice_issues` shell-out can read
          # Issue labels and enforce the Dual-update rule in CI (not just
          # locally via `make issue-check`).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 docs/Musubi/_tools/check.py all
