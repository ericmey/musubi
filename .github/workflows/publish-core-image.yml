name: Publish Musubi Core image

# Publishes ghcr.io/ericmey/musubi-core, replacing the one-shot
# `docker save | ssh | docker load` transfer used for the first
# deploy. See [[_slices/slice-ops-core-image-publish]] and
# `deploy/runbooks/upgrade-image.md`.
#
# Triggers (rationale in the slice spec):
#
#   push tag `v*`   — authoritative release. Publishes `:v<version>`
#                     + `@sha256:<digest>`. The digest becomes the
#                     value operators paste into group_vars/all.yml.
#   push branch v2  — bleeding-edge. Publishes `:v2` (floating) and
#                     captures the digest as a build artefact.
#   workflow_dispatch — manual one-off (operator chooses tags).
#
# The workflow NEVER writes to `group_vars/all.yml`. The digest bump
# is a separate, human-reviewed PR per the slice spec — keeps the
# "publish" and "deploy" decisions distinct.

on:
  push:
    tags:
      - "v*"
    branches:
      - v2
  workflow_dispatch:
    inputs:
      tag:
        description: "Override tag (default: branch name for branch pushes, tag for tag pushes)"
        required: false
        default: ""

concurrency:
  # Coalesce runs on the same ref so a fast sequence of pushes doesn't
  # queue up redundant publishes.
  group: publish-core-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-core-image:
    name: Build and publish musubi-core
    runs-on: ubuntu-latest
    permissions:
      # GITHUB_TOKEN needs `packages: write` to push to the repo's GHCR
      # namespace. `id-token: write` is required for cosign keyless
      # signing via GitHub's OIDC provider. `security-events: write`
      # is required by `github/codeql-action/upload-sarif@v3` to post
      # Trivy findings to the Security → Code scanning tab. `actions:
      # read` lets upload-sarif hit the workflow-runs API for
      # fingerprinting — without it the step fails with "Resource not
      # accessible by integration" even when SARIF itself is valid.
      contents: read
      packages: write
      id-token: write
      security-events: write
      actions: read
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        # Needed for reliable cross-build to linux/amd64 from the GHA
        # linux/amd64 runner itself. Cheap insurance against future
        # multi-arch additions.
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ericmey/musubi-core
          tags: |
            # `v<version>` tag push → `:v<version>` + `:latest`
            type=semver,pattern={{version}},prefix=v,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # `v2` branch push → `:v2` floating
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/v2' }}
            # manual dispatch with explicit tag input
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/ericmey/musubi
            org.opencontainers.image.description=Musubi Core — three-plane shared memory server
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache so subsequent builds reuse layers without
          # pushing cache layers into GHCR itself.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Embed provenance + SBOM attestations in the manifest. This
          # is the default on build-push-action v6 but declaring
          # explicitly documents the supply-chain commitment.
          provenance: true
          sbom: true

      # ------------------------------------------------------------------
      # Supply-chain hardening. Each step is allowed to fail the job —
      # a signed, scanned image is the contract this workflow sells.
      # ------------------------------------------------------------------

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: Sign the published image (keyless, via GitHub OIDC)
        # Signs by digest — tags are mutable, digests aren't. Anyone
        # can verify later with `cosign verify --certificate-identity-
        # regexp 'https://github.com/ericmey/musubi/.*' --certificate-
        # oidc-issuer https://token.actions.githubusercontent.com
        # ghcr.io/ericmey/musubi-core@<digest>`. Verification on the
        # deploy side is future-enabled by ADR (not required today).
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cosign sign --yes \
            "ghcr.io/ericmey/musubi-core@${{ steps.build.outputs.digest }}"

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: "ghcr.io/ericmey/musubi-core@${{ steps.build.outputs.digest }}"
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true

      - name: Attach SBOM as cosign attestation
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate sbom.cdx.json \
            --type cyclonedx \
            "ghcr.io/ericmey/musubi-core@${{ steps.build.outputs.digest }}"

      - name: Trivy vulnerability scan (table — always visible in logs)
        # Human-readable pass first so operators can see what CRITICAL
        # / HIGH findings exist without downloading the SARIF artefact.
        # `exit-code: 0` → this step never fails; gating is below.
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "ghcr.io/ericmey/musubi-core@${{ steps.build.outputs.digest }}"
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          scanners: vuln

      - name: Trivy vulnerability scan (SARIF — CRITICAL gate)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "ghcr.io/ericmey/musubi-core@${{ steps.build.outputs.digest }}"
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          # `limit-severities-for-sarif` forces trivy-action to apply
          # the `severity:` filter when emitting SARIF. Without it the
          # action generates a SARIF report containing findings of ALL
          # severities, and `exit-code: 1` then fires on any non-empty
          # report — turning a CRITICAL-only gate into a de-facto
          # HIGH+CRITICAL gate.
          limit-severities-for-sarif: "true"
          # Exit 1 if any CRITICAL vulnerability is found. HIGH is
          # surfaced in the prior table step for visibility but NOT
          # gated — a homelab service can't afford to chase every
          # libssl HIGH on upstream images. Tune via `.trivyignore`
          # if we hit false positives too often.
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln

      - name: Upload Trivy SARIF to GitHub Security tab
        # Runs even if Trivy failed so the findings are visible in
        # the repo's Security → Code scanning view.
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Summarise digest
        # Surface the digest at the top of the workflow run page so an
        # operator can copy it into `group_vars/all.yml` without hunting
        # through step logs.
        run: |
          echo "### Published ghcr.io/ericmey/musubi-core" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Digest:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pin in \`deploy/ansible/group_vars/all.yml\` as:" >> "$GITHUB_STEP_SUMMARY"
          echo '```yaml' >> "$GITHUB_STEP_SUMMARY"
          echo "musubi_core_image: \"ghcr.io/ericmey/musubi-core@${{ steps.build.outputs.digest }}\"" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Attach digest as release asset
        # Only on tag pushes — branch pushes don't create releases.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            Published `ghcr.io/ericmey/musubi-core` for this release.

            **Tags:** `${{ steps.meta.outputs.tags }}`

            **Digest:** `${{ steps.build.outputs.digest }}`

            Pin in `deploy/ansible/group_vars/all.yml`:

            ```yaml
            musubi_core_image: "ghcr.io/ericmey/musubi-core@${{ steps.build.outputs.digest }}"
            ```
          append_body: true
          fail_on_unmatched_files: false
