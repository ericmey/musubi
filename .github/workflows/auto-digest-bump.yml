name: Auto digest bump

# Tier-3 automation of the manual step that shipped v0.3.0: after a
# signed image lands on GHCR, this workflow opens (or keeps updated)
# a PR titled `chore(deploy): pin musubi-core to <tag> signed digest`
# that edits `deploy/ansible/group_vars/all.yml::musubi_core_image` to
# the new `@sha256:<digest>`.
#
# The pin PR auto-merges once required checks pass (auto-merge is
# enabled by this workflow on PR creation). The operator is only in
# the loop for the deploy itself — `ansible-playbook update.yml` is
# invoked manually from the control host after the pin has landed on
# `main`. Deploys are a human decision; pinning the config is not.
#
# ## Triggers
#
# Primary: `workflow_run` after `publish-core-image.yml` finishes on a
# tag. This is the only correct ordering — `release:published` (the
# previous trigger) races with the image build, and the digest lookup
# 404s before the manifest is pushed (closes #247). `workflow_run`
# guarantees the image exists + is signed + is SBOM-attested by the
# time we ask GHCR for its digest.
#
# Fallback: `workflow_dispatch` with an optional `tag` input. Used
# when the primary path's conditions don't fire (e.g. the publish
# workflow was re-run after an unrelated fix and we want a new pin
# without re-tagging).
#
# ## Auth
#
# Uses `RELEASE_PLEASE_PAT` (with `GITHUB_TOKEN` as a warned fallback)
# so PR creation is authored by a PAT identity. PRs opened by
# `GITHUB_TOKEN` do not trigger the target branch's CI (GitHub's
# anti-recursion guard), which produces BLOCKED PRs waiting on a
# required `check` context that never runs. Same fix pattern as
# `release-please.yml`.

on:
  workflow_run:
    workflows: ["Publish Musubi Core image"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to pin (e.g. v0.3.1). Defaults to the latest published release."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-digest-bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    # Primary path: publish-core-image finished *successfully* on a
    # tag ref (tag names start with "v"). Skip on main-branch pushes
    # (publish-core-image also runs on those, but we only pin on
    # real releases).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success'
       && startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      # Warn loud if the PAT is missing. Same spirit as release-please.yml:
      # we'd rather fail noisily up-front than create a BLOCKED PR and
      # leave the operator guessing why CI never ran on it.
      - name: Warn if RELEASE_PLEASE_PAT is unset
        env:
          RELEASE_PLEASE_PAT: ${{ secrets.RELEASE_PLEASE_PAT }}
        if: ${{ env.RELEASE_PLEASE_PAT == '' }}
        run: |
          echo "::warning::RELEASE_PLEASE_PAT is unset — falling back to GITHUB_TOKEN. The auto-pin PR this run creates will NOT trigger branch CI (anti-recursion guard), so the required 'check' context never runs and the PR stays BLOCKED. Set the secret to restore auto-mergeable pin PRs."

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # PAT, not GITHUB_TOKEN — see header + warning-step comments
          # for the why. Fallback keeps the job runnable when the PAT
          # is absent (with the warning surfaced).
          token: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Resolve tag + digest
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # 1. Determine the tag. Three sources:
          # - workflow_run: publish-core-image's head_branch IS the tag
          #   name for tag-push-triggered runs ("v0.7.0", etc.).
          # - workflow_dispatch: the explicit input.
          # - Fallback: latest GitHub release.
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            TAG="${{ github.event.workflow_run.head_branch }}"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"

          # 2. Resolve the tag to a content digest via GHCR's anonymous registry API.
          # The package is public, so no auth needed. Ask for both the v2 manifest
          # AND the OCI index content type — GHCR serves whichever matches.
          REGISTRY="ghcr.io"
          IMAGE="ericmey/musubi-core"
          TOKEN=$(curl -sf "https://${REGISTRY}/token?service=${REGISTRY}&scope=repository:${IMAGE}:pull" \
                  | python3 -c 'import sys,json; print(json.load(sys.stdin)["token"])')

          DIGEST=$(curl -sf \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            -H "Accept: application/vnd.oci.image.manifest.v1+json" \
            -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            -D - \
            "https://${REGISTRY}/v2/${IMAGE}/manifests/${TAG}" \
            | tr -d '\r' | awk '/^docker-content-digest:/ {print $2}')

          if [[ -z "${DIGEST}" ]]; then
            echo "::error::could not resolve a digest for ${REGISTRY}/${IMAGE}:${TAG}"
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Resolved digest: ${DIGEST}"

      - name: Patch group_vars
        id: patch
        run: |
          set -euo pipefail
          FILE="deploy/ansible/group_vars/all.yml"
          NEW="ghcr.io/ericmey/musubi-core@${{ steps.resolve.outputs.digest }}"

          # Replace the line regardless of what was there before. The file
          # uses double-quoted strings for this field.
          python3 - <<PY
          import re, pathlib
          p = pathlib.Path("$FILE")
          text = p.read_text()
          new = '"${NEW}"'
          updated = re.sub(
              r'(musubi_core_image:\s*)(["\x27])[^"\x27]+\2',
              rf'\g<1>{new}',
              text,
              count=1,
          )
          if updated == text:
              raise SystemExit("musubi_core_image line not found in " + str(p))
          p.write_text(updated)
          PY

          if git diff --quiet "$FILE"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already pinned to ${NEW}; nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Patched ${FILE}."
          fi

      - name: Open or update PR
        if: steps.patch.outputs.changed == 'true'
        env:
          # PAT so the PR triggers branch CI. With GITHUB_TOKEN the PR
          # opens but the required `check` context never runs, and the
          # PR stays BLOCKED on an absent status.
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.tag }}
          DIGEST: ${{ steps.resolve.outputs.digest }}
        run: |
          set -euo pipefail
          BRANCH="chore/auto-pin-${TAG}"
          TITLE="chore(deploy): pin musubi-core to ${TAG} signed digest"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git switch -c "${BRANCH}"
          git add deploy/ansible/group_vars/all.yml
          git commit -m "${TITLE}

          Automated by .github/workflows/auto-digest-bump.yml in response
          to the ${TAG} release. The image has been cosign-signed,
          SBOM-attested, and Trivy-scanned by publish-core-image.yml —
          verify before deploy:

              cosign verify \\
                --certificate-identity-regexp 'https://github.com/ericmey/musubi/.*' \\
                --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
                ghcr.io/ericmey/musubi-core@${DIGEST}

          No tracking Issue: auto-generated release digest pin."

          git push -u origin "${BRANCH}" --force

          # Create or update the PR. Detect existing by branch head.
          # `// empty` coalesces a null-array (no open PR for this
          # branch) to an empty string, so the `-n` check below
          # correctly takes the create path instead of
          # `gh pr edit null`.
          EXISTING=$(gh pr list --head "${BRANCH}" --state open --json number --jq '.[0].number // empty' || true)
          BODY=$(cat <<EOF
          ${TITLE}

          Automated by \`.github/workflows/auto-digest-bump.yml\` in response to the [${TAG}](https://github.com/${{ github.repository }}/releases/tag/${TAG}) release.

          ## Supply-chain attestations
          - cosign keyless signature via GitHub OIDC
          - CycloneDX SBOM attached as a cosign attestation
          - Trivy vulnerability scan — 0 CRITICAL (gate in \`publish-core-image.yml\`)

          ## Verify before deploy

          \`\`\`bash
          cosign verify \\
            --certificate-identity-regexp 'https://github.com/ericmey/musubi/.*' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
            ghcr.io/ericmey/musubi-core@${DIGEST}
          \`\`\`

          ## After merge

          \`\`\`bash
          # From the ansible control host:
          cd ~/musubi
          git pull origin main
          ANSIBLE_VAULT_PASSWORD_FILE=~/ansible/.vault_pass \\
            ansible-playbook \\
              -i deploy/ansible/inventory.yml \\
              -e @~/.musubi-secrets/inventory-vars.yml \\
              -e @~/.musubi-secrets/vault.yml \\
              -e 'changed_services=["core","lifecycle-worker"]' \\
              deploy/ansible/update.yml
          \`\`\`

          No tracking Issue: auto-generated release digest pin.
          EOF
          )
          if [[ -n "${EXISTING}" ]]; then
            echo "Updating existing PR #${EXISTING}"
            gh pr edit "${EXISTING}" --title "${TITLE}" --body "${BODY}"
            PR_NUMBER="${EXISTING}"
          else
            echo "Opening new PR"
            # `gh pr create` prints the PR URL on stdout; the trailing
            # path component is the number. More reliable than
            # re-listing immediately after create (GitHub's API can
            # briefly return an empty list while the PR is indexing).
            PR_URL=$(gh pr create --base main --head "${BRANCH}" --title "${TITLE}" --body "${BODY}")
            PR_NUMBER="${PR_URL##*/}"
          fi

          # Flip on auto-merge so the pin lands the moment required
          # checks go green. Same "no human gate" policy as
          # release-please.yml. Idempotent — calling --auto on a PR
          # that already has auto-merge is a no-op.
          if [[ -n "${PR_NUMBER}" && "${PR_NUMBER}" != "null" ]]; then
            echo "Enabling auto-merge on PR #${PR_NUMBER}"
            gh pr merge "${PR_NUMBER}" --auto --squash
          else
            echo "::warning::could not resolve PR number; skipping auto-merge enable."
          fi
