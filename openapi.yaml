          type: string
          maxLength: 64
          minLength: 64
          pattern: ^[0-9a-f]{64}$
          title: Sha256
          description: sha256 hex digest of the raw bytes.
        content_type:
          type: string
          minLength: 1
          title: Content Type
        size_bytes:
          type: integer
          minimum: 0.0
          title: Size Bytes
        chunk_count:
          type: integer
          minimum: 0.0
          title: Chunk Count
          default: 0
        ingestion_metadata:
          additionalProperties: true
          type: object
          title: Ingestion Metadata
        chunker:
          type: string
          minLength: 1
          title: Chunker
          description: Name of the chunker used, e.g. 'markdown-headings-v1'.
        artifact_state:
          type: string
          enum:
          - indexing
          - indexed
          - failed
          title: Artifact State
          default: indexing
        failure_reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Failure Reason
      additionalProperties: false
      type: object
      required:
      - namespace
      - title
      - filename
      - sha256
      - content_type
      - size_bytes
      - chunker
