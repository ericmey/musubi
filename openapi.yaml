openapi: 3.1.0
info:
  title: Musubi Core API
  description: The canonical HTTP surface over Musubi Core. Read + write; full v0.1
    surface.
  version: 0.1.0
paths:
  /v1/ops/health:
    get:
      tags:
      - ops
      summary: Health
      description: "Liveness probe. Always 200 if the process can serve requests.\n\
        Readiness \u2014 does the process have working dependencies \u2014 is on\n\
        ``/v1/ops/status``."
      operationId: health_v1_ops_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/ops/status:
    get:
      tags:
      - ops
      summary: Status
      description: "Per-component readiness \u2014 Qdrant + every TEI service + Ollama."
      operationId: status_v1_ops_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /v1/ops/metrics:
    get:
      tags:
      - ops
      summary: Metrics
      description: Prometheus-format metrics from the in-process registry.
      operationId: metrics_v1_ops_metrics_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /v1/ops/debug/trigger-synthesis:
    post:
      tags:
      - ops
      summary: Trigger Synthesis
      description: 'Drive one synthesis tick on demand.


        Test-hook for the integration harness (Issue #119). Restricted to

        operator-scope tokens; the synthesis loop is expensive enough that

        arbitrary callers shouldn''t trigger it. Production workers run

        synthesis on their own tick loop; this endpoint exists so the

        integration suite can deterministically exercise the path without

        an embedded worker.'
      operationId: debug_trigger_synthesis.bucket=default
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerSynthesisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerSynthesisResponse'
        '403':
          description: Caller does not hold operator scope.
        '501':
          description: '`simulate_ollama_offline=false` but no production Ollama client
            impl is wired in. See Issue #119 for context.'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/memories/{object_id}:
    get:
      tags:
      - episodic
      summary: Get Memory
      operationId: get_memory_v1_memories__object_id__get
      parameters:
      - name: object_id
        in: path
        required: true
        schema:
          type: string
          title: Object Id
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpisodicMemory'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - episodic-writes
      summary: Patch Episodic
      description: "Update non-state metadata on an existing episodic row.\n\nState\
        \ changes are forbidden on this surface \u2014 they go through\nPOST /v1/lifecycle/transition\
        \ so the lifecycle ledger records every\nstate mutation. Tags / importance\
        \ / summary are non-state metadata\nand land via a payload-only ``set_payload``\
        \ (analogous to the\nenrichment writes the maturation sweep does \u2014 see\n\
        :mod:`musubi.lifecycle.maturation` for precedent)."
      operationId: patch_episodic.bucket=default
      parameters:
      - name: object_id
        in: path
        required: true
        schema:
          type: string
          title: Object Id
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchEpisodicRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpisodicMemory'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - episodic-writes
      summary: Delete Episodic
      description: "Soft-delete by default (state \u2192 archived via the canonical\n\
        ``transition()`` primitive). ``?hard=true`` requires operator\nscope and removes\
        \ the point from Qdrant entirely.\n\nThe operator-scope check on the hard\
        \ path reads the\n:class:`AuthContext` that the outer ``require_auth`` dependency\
        \ has\nalready attached to ``request.state.auth``."
      operationId: delete_episodic.bucket=default
      parameters:
      - name: object_id
        in: path
        required: true
        schema:
          type: string
          title: Object Id
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      - name: hard
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Hard
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/memories:
    get:
      tags:
      - episodic
      summary: List Memories
      operationId: list_memories_v1_memories_get
      parameters:
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 50
          title: Limit
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page_EpisodicMemory_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - episodic-writes
      summary: Capture
      operationId: capture_episodic.bucket=capture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureRequest'
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/curated-knowledge/{object_id}:
    get:
      tags:
      - curated
      summary: Get Curated
      operationId: get_curated_v1_curated_knowledge__object_id__get
      parameters:
      - name: object_id
        in: path
        required: true
        schema:
          type: string
          title: Object Id
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CuratedKnowledge'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - curated-writes
      summary: Patch Curated
      operationId: patch_curated.bucket=default
      parameters:
      - name: object_id
        in: path
        required: true
        schema:
          type: string
          title: Object Id
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchCuratedRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CuratedKnowledge'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - curated-writes
      summary: Delete Curated
      operationId: delete_curated.bucket=default
      parameters:
      - name: object_id
        in: path
        required: true
        schema:
          type: string
          title: Object Id
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/curated-knowledge:
    get:
      tags:
      - curated
      summary: List Curated
      operationId: list_curated_v1_curated_knowledge_get
      parameters:
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 50
          title: Limit
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page_CuratedKnowledge_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - curated-writes
      summary: Create Curated
      operationId: create_curated.bucket=capture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CuratedCreateRequest'
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CuratedCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/concepts/{object_id}:
    get:
      tags:
      - concept
      summary: Get Concept
      operationId: get_concept_v1_concepts__object_id__get
      parameters:
      - name: object_id
        in: path
        required: true
        schema:
          type: string
          title: Object Id
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SynthesizedConcept'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - concept-writes
      summary: Delete Concept
      operationId: delete_concept.bucket=default
      parameters:
      - name: object_id
        in: path
        required: true
        schema:
          type: string
          title: Object Id
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/concepts:
    get:
      tags:
      - concept
      summary: List Concepts
      operationId: list_concepts_v1_concepts_get
      parameters:
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 50
          title: Limit
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page_SynthesizedConcept_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/artifacts/{object_id}:
    get:
      tags:
      - artifact
      summary: Get Artifact
      operationId: get_artifact_v1_artifacts__object_id__get
      parameters:
      - name: object_id
        in: path
        required: true
        schema:
          type: string
          title: Object Id
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceArtifact'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/artifacts/{object_id}/chunks:
    get:
      tags:
      - artifact
      summary: Get Artifact Chunks
      operationId: get_artifact_chunks_v1_artifacts__object_id__chunks_get
      parameters:
      - name: object_id
        in: path
        required: true
        schema:
          type: string
          title: Object Id
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArtifactChunk'
                title: Response Get Artifact Chunks V1 Artifacts  Object Id  Chunks
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/artifacts/{object_id}/blob:
    get:
      tags:
      - artifact
      summary: Get Artifact Blob
      description: "Stream the raw bytes of an artifact.\n\nBytes are served from\
        \ ``settings.artifact_blob_path/<namespace>/<object_id>``\n\u2014 the same\
        \ layout the cleanup worker walks (ops/cleanup.py). The\nwrite path lives\
        \ in ``writes_artifact.upload_artifact``. Content-\naddressed storage (by\
        \ sha256, S3 backend) is a follow-up; this\nslice is the minimum viable round-trip\
        \ so adapters can retrieve\nwhat they uploaded."
      operationId: get_artifact_blob_v1_artifacts__object_id__blob_get
      parameters:
      - name: object_id
        in: path
        required: true
        schema:
          type: string
          title: Object Id
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/artifacts:
    get:
      tags:
      - artifact
      summary: List Artifacts
      operationId: list_artifacts_v1_artifacts_get
      parameters:
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 50
          title: Limit
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page_SourceArtifact_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - artifact-writes
      summary: Upload Artifact
      operationId: upload_artifact.bucket=artifact-upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/bucket_artifact-upload'
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/thoughts/check:
    post:
      tags:
      - thoughts
      summary: Check Thoughts
      operationId: check_thoughts_v1_thoughts_check_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThoughtCheckRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThoughtListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/thoughts/history:
    post:
      tags:
      - thoughts
      summary: Thought History
      description: 'First-cut: history is a namespace scroll. Semantic search will

        land once slice-retrieval-fast wires its dense path through the API.'
      operationId: thought_history_v1_thoughts_history_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThoughtHistoryRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThoughtListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/thoughts/stream:
    get:
      tags:
      - thoughts
      summary: Stream Thoughts
      description: 'SSE endpoint for real-time thought delivery.


        Replay semantics via Last-Event-ID are declared in the spec but deferred to

        the integration harness (needs a real Qdrant with live range queries; mocked

        Qdrant in unit tests doesn''t model lex-sorted epoch-range scrolls). The

        header is accepted and validated but currently the stream begins from the

        live broker queue only. See slice-api-thoughts-stream work log.'
      operationId: stream_thoughts.bucket=default
      parameters:
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      - name: include
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Include
      - name: Last-Event-ID
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Last-Event-Id
      responses:
        '200':
          description: Server-sent event stream of delivered thoughts.
          content:
            application/json:
              schema:
                title: Response Stream Thoughts.Bucket=Default
            text/event-stream:
              schema:
                type: string
        '403':
          description: Caller does not hold read scope for `namespace`.
        '503':
          description: Thought broker unavailable.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/retrieve:
    post:
      tags:
      - retrieve
      summary: Retrieve
      operationId: retrieve_v1_retrieve_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrieveQuery'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrieveResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/lifecycle/events:
    get:
      tags:
      - lifecycle
      summary: List Events
      description: 'Operator-only: list lifecycle events.


        The events themselves are recorded in a sqlite ledger by the

        lifecycle engine (see ``src/musubi/lifecycle/events.py``); the

        Qdrant mirror collection ``musubi_lifecycle_events`` is the

        listable view per [[04-data-model/qdrant-layout]]. If the mirror

        isn''t populated yet (the slice that does the dual-write hasn''t

        landed), the list comes back empty rather than erroring.'
      operationId: list_events_v1_lifecycle_events_get
      parameters:
      - name: namespace
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Namespace
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LifecycleEventListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/lifecycle/events/{object_id}:
    get:
      tags:
      - lifecycle
      summary: List Events For Object
      operationId: list_events_for_object_v1_lifecycle_events__object_id__get
      parameters:
      - name: object_id
        in: path
        required: true
        schema:
          type: string
          title: Object Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LifecycleEventListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/contradictions:
    get:
      tags:
      - contradictions
      summary: List Contradictions
      description: "Concept rows whose ``contradicts`` field is non-empty.\n\nCross-namespace\
        \ by default (operator scope); namespace-scoped when\n``namespace`` is supplied.\
        \ The data source is the concept plane\npayload \u2014 concepts mark each\
        \ other as contradicting during synthesis\n(slice-lifecycle-synthesis)."
      operationId: list_contradictions_v1_contradictions_get
      parameters:
      - name: namespace
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Namespace
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContradictionListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/namespaces:
    get:
      tags:
      - namespaces
      summary: List Namespaces
      description: 'List the namespaces the bearer''s scope grants access to.


        Reads ``request.state.auth.scopes`` (set by ``authenticate_request``)

        and returns the namespace prefixes. Operator-scoped tokens get the

        string ``"*"`` instead of a per-namespace list.'
      operationId: list_namespaces_v1_namespaces_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceListResponse'
  /v1/namespaces/{namespace_path}/stats:
    get:
      tags:
      - namespaces
      summary: Namespace Stats
      description: "Counts per plane for the given namespace + last activity epoch.\n\
        \nThe ``namespace_path`` arrives URL-encoded (slashes \u2192 ``%2F``) per\n\
        standard FastAPI ``:path`` handling."
      operationId: namespace_stats_v1_namespaces__namespace_path__stats_get
      parameters:
      - name: namespace_path
        in: path
        required: true
        schema:
          type: string
          title: Namespace Path
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceStats'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/memories/batch:
    post:
      tags:
      - episodic-writes
      summary: Batch Capture
      operationId: batch_capture.bucket=batch-write
      requestBody:
        content:
          application/json:
            schema:
