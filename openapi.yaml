          anyOf:
          - type: number
          - type: 'null'
          title: Created Epoch
        updated_at:
          type: string
          format: date-time
          title: Updated At
        updated_epoch:
          anyOf:
          - type: number
          - type: 'null'
          title: Updated Epoch
