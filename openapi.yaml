components:
  schemas:
    ArtifactChunk:
      properties:
        chunk_id:
          type: string
          title: Chunk Id
        artifact_id:
          type: string
          title: Artifact Id
        chunk_index:
          type: integer
          minimum: 0.0
          title: Chunk Index
        content:
          type: string
          minLength: 1
          title: Content
        start_offset:
          type: integer
          minimum: 0.0
          title: Start Offset
        end_offset:
          type: integer
          minimum: 0.0
          title: End Offset
        chunk_metadata:
          additionalProperties: true
          type: object
          title: Chunk Metadata
      additionalProperties: false
      type: object
      required:
      - chunk_id
      - artifact_id
      - chunk_index
      - content
      - start_offset
      - end_offset
      title: ArtifactChunk
      description: "One chunk of a source artifact. Not a MusubiObject \u2014 lives\
        \ inside one."
    ArtifactCreateResponse:
      properties:
        object_id:
          type: string
          title: Object Id
        state:
          type: string
          title: State
        size_bytes:
          type: integer
          title: Size Bytes
        sha256:
          type: string
          title: Sha256
      type: object
      required:
      - object_id
      - state
      - size_bytes
      - sha256
      title: ArtifactCreateResponse
    ArtifactRef:
      properties:
        artifact_id:
          type: string
          title: Artifact Id
        chunk_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Chunk Id
        quote:
          anyOf:
          - type: string
          - type: 'null'
          title: Quote
      additionalProperties: false
      type: object
      required:
      - artifact_id
      title: ArtifactRef
      description: "A pointer into a ``SourceArtifact`` \u2014 whole artifact or a\
        \ specific chunk.\n\nUsed by ``MemoryObject.supported_by`` to cite evidence."
    BatchCaptureRequest:
