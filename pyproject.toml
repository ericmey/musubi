[project]
name = "musubi"
version = "0.2.0"
description = "Shared memory + knowledge plane for a small-team AI agent fleet. See the Obsidian architecture vault for design."
requires-python = ">=3.12"
authors = [{ name = "Eric Mey", email = "ericmey@gmail.com" }]
license = { text = "Private" }
readme = "README.md"

dependencies = [
    "pydantic>=2.9",
    "pydantic-settings>=2.4",
    "svix-ksuid>=0.6",
    "qdrant-client>=1.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "pytest-asyncio>=0.23",
    "hypothesis>=6",
    "mypy>=1.11",
    "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/musubi"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "C4", "SIM", "RUF"]
ignore = ["E501"]   # line length — handled elsewhere

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
strict = true
pretty = true
show_error_codes = true
warn_unused_ignores = true
namespace_packages = true
explicit_package_bases = true
mypy_path = "src"

[[tool.mypy.overrides]]
module = ["ksuid.*", "svix_ksuid.*", "ksuid", "qdrant_client.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra --strict-markers --strict-config"
markers = [
    "integration: requires Qdrant / TEI / Ollama; skipped by default",
    "property: Hypothesis-based property test",
]
# Local-mode qdrant-client warns that payload indexes are no-ops. We verify
# index behavior against a mocked client (see tests/store/test_indexes.py)
# and against a real server in integration tests, so this warning is noise.
filterwarnings = [
    "ignore:Payload indexes have no effect in the local Qdrant:UserWarning",
]
