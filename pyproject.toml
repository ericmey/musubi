[project]
name = "musubi"
version = "1.0.0"
description = "Musubi (結び) — Shared memory and thought layer for AI agent presences. Born from Aoi."
requires-python = ">=3.12"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
]
ignore = [
    "E501",   # line too long — handled by formatter
    "B006",   # mutable default arguments — handled with None + guard at call site
]

[tool.ruff.lint.isort]
known-first-party = ["musubi"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=musubi --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
omit = ["musubi/server.py"]  # MCP tool wrappers — thin delegation layer, tested via pure functions

[tool.mypy]
python_version = "3.12"
strict = false
warn_return_any = true
warn_unused_configs = true
warn_unreachable = true
disallow_untyped_defs = true
check_untyped_defs = true
ignore_missing_imports = true

[tool.bandit]
exclude_dirs = ["tests"]
skips = ["B101"]  # assert is fine in non-production code
